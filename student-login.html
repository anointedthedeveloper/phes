<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - School Portal</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="login-screen">
        <div class="login-background">
            <div class="login-particles" id="login-particles"></div>
        </div>
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <img src="assets/logo.png" alt="School Portal Logo" class="login-logo-img">
                </div>
                <h2 class="login-title">Student Sign In</h2>
                <p class="login-subtitle">Access your examination portal</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="input-group">
                    <input type="text" id="username" class="input-field" placeholder=" " required>
                    <label class="input-label">Student ID / Username</label>
                    <div class="input-underline"></div>
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder=" " required>
                    <label class="input-label">Password</label>
                    <div class="input-underline"></div>
                    <button type="button" class="show-password-btn" onclick="togglePassword('password')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <button type="submit" class="login-button">
                    <span class="button-text">Sign In</span>
                    <div class="button-loader"></div>
                    <div class="button-ripple"></div>
                </button>
            </form>
            <div class="login-footer">
                <p class="demo-credentials">Demo: student/student123</p>
                <a href="index.html" class="back-link">← Back to Welcome</a>
            </div>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/student-login.js"></script>
</body>
</html>
