<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examination - School Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="exam-interface">
        <div class="exam-header">
            <div class="exam-info">
                <h2 class="exam-title" id="current-exam-title">Exam Title</h2>
                <p class="exam-subject" id="current-exam-subject">Subject</p>
            </div>
            <div class="exam-timer">
                <span class="timer-icon">⏱️</span>
                <span class="timer-display" id="exam-timer">00:00:00</span>
            </div>
            <button class="submit-exam-button" id="submit-exam-btn">Submit Exam</button>
        </div>
        <div class="exam-body">
            <div class="question-area">
                <div class="question-header">
                    <span class="question-number" id="current-question-number">Question 1</span>
                    <span class="question-progress" id="question-progress">1/10</span>
                </div>
                <div class="question-content">
                    <p class="question-text" id="question-text">Question text goes here?</p>
                </div>
                <div class="options-container" id="options-container"></div>
            </div>
            <div class="question-nav">
                <div class="nav-buttons">
                    <button class="nav-button prev-button" id="prev-question">Previous</button>
                    <button class="nav-button next-button" id="next-question">Next</button>
                </div>
                <div class="question-palette" id="question-palette"></div>
            </div>
        </div>
    </div>

    <!-- Submit Confirmation Modal -->
    <div id="modal-container" class="modal-container hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/exam.js"></script>
</body>
</html>
